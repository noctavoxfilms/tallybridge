<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0d0d0d"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ff3b3b" stroke-width="8" opacity="0.3"/>
  
  <!-- Red circle -->
  <circle cx="256" cy="256" r="180" fill="#ff3b3b"/>
  
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)" opacity="0.4"/>
  
  <!-- TB letters -->
  <text x="256" y="310" 
        font-family="'Barlow Condensed', 'Helvetica Neue', Arial, sans-serif"
        font-size="180" font-weight="900" 
        fill="white" text-anchor="middle"
        letter-spacing="-8">TB</text>

  <!-- Dot indicator (bottom right) -->
  <circle cx="390" cy="390" r="32" fill="#0d0d0d"/>
  <circle cx="390" cy="390" r="20" fill="#ff3b3b"/>

  <defs>
    <radialGradient id="glow" cx="40%" cy="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
