name: Build TallyBridge

on:
  push:
    tags:
      - 'v*'           # Dispara en tags como v1.0.0, v1.1.0
  workflow_dispatch:   # Permite disparar manualmente desde GitHub UI

jobs:
  # ── BUILD WINDOWS ────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TallyBridge-Windows
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 30

  # ── BUILD MAC ────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac (universal)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TallyBridge-Mac
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
          retention-days: 30

  # ── RELEASE (solo en tags) ───────────────────────────────────
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: TallyBridge-Windows
          path: dist

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: TallyBridge-Mac
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TallyBridge ${{ github.ref_name }}
          body: |
            ## TallyBridge ${{ github.ref_name }}

            Conecta tu switcher a TallyComm sin instalar Companion ni TallyArbiter.

            ### Descargas
            - **Mac (Apple Silicon):** `TallyBridge-*-arm64.dmg`
            - **Mac (Intel):** `TallyBridge-*.dmg`
            - **Windows:** `TallyBridge Setup *.exe`

            ### Compatibilidad
            - ✅ OBS Studio (WebSocket v5)
            - 🔜 ATEM, vMix, RGBlink (próximamente)
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
